<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Long Road</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #050508; }
    body { cursor: none; }
    #c { display: block; image-rendering: pixelated; image-rendering: crisp-edges; }

    #loading {
      position: fixed; inset: 0;
      background: #050508;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 20px; z-index: 999;
      transition: opacity 0.6s ease;
      font-family: 'Press Start 2P', monospace;
    }
    #loading.fade { opacity: 0; pointer-events: none; }

    #loading h1 { color: #f0c040; font-size: 22px; text-align: center; line-height: 2; letter-spacing: 2px; }
    #loading p  { color: #604010; font-size: 9px; }

    #bar-wrap { width: 320px; height: 18px; border: 2px solid #604010; background: #0a0808; }
    #bar      { height: 100%; background: linear-gradient(90deg, #803000, #f0a020); width: 0%; transition: width 0.3s; }

    #load-txt { color: #806040; font-size: 8px; height: 16px; }
  </style>
</head>
<body>

<div id="loading">
  <h1>THE<br>LONG<br>ROAD</h1>
  <div id="bar-wrap"><div id="bar"></div></div>
  <div id="load-txt">Assembling the fellowship...</div>
</div>

<canvas id="c"></canvas>

<!-- Load order: config → particles → sprites → scene → world → companions → combat → game → renderer -->
<script src="js/config.js"></script>
<script src="js/particles.js"></script>
<script src="js/sprites.js"></script>
<script src="js/scene.js"></script>
<script src="js/world.js"></script>
<script src="js/companions.js"></script>
<script src="js/combat.js"></script>
<script src="js/game.js"></script>
<script src="js/renderer.js"></script>

<script>
(function () {
  'use strict';

  const canvas   = document.getElementById('c');
  const loading  = document.getElementById('loading');
  const bar      = document.getElementById('bar');
  const loadTxt  = document.getElementById('load-txt');

  let game, renderer, lastTime = 0;
  const TARGET_MS = 1000 / C.FPS;

  const LOAD_STEPS = [
    [15,  'Forging pixel swords...'],
    [30,  'Briefing the fellowship...'],
    [50,  'Painting the Whisperwood...'],
    [65,  'Teaching Brom not to shout...'],
    [80,  'Teaching Brom to shout (failed)...'],
    [92,  'Lighting the campfire...'],
    [100, 'Ready.'],
  ];
  let stepIdx = 0;

  function nextStep() {
    if (stepIdx >= LOAD_STEPS.length) { startGame(); return; }
    const [pct, txt] = LOAD_STEPS[stepIdx++];
    bar.style.width = pct + '%';
    loadTxt.textContent = txt;
    setTimeout(nextStep, 260);
  }

  function startGame() {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;

    game     = new Game(canvas);
    renderer = new Renderer(canvas, game);
    game.init();

    window.addEventListener('resize', () => {
      game.resize();
      renderer.canvas.width  = window.innerWidth;
      renderer.canvas.height = window.innerHeight;
    });

    window.addEventListener('keydown', e => {
      const blocked = ['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' ','Tab'];
      if (blocked.includes(e.key)) e.preventDefault();
      game.handleKey(e.key);
    });

    // Touch/swipe
    let tx0 = 0, ty0 = 0;
    canvas.addEventListener('touchstart', e => { tx0 = e.touches[0].clientX; ty0 = e.touches[0].clientY; e.preventDefault(); }, { passive: false });
    canvas.addEventListener('touchend', e => {
      const dx = e.changedTouches[0].clientX - tx0;
      const dy = e.changedTouches[0].clientY - ty0;
      if (Math.max(Math.abs(dx), Math.abs(dy)) < 20) { game.handleKey('Enter'); }
      else if (Math.abs(dx) > Math.abs(dy)) game.handleKey(dx > 0 ? 'ArrowRight' : 'ArrowLeft');
      else game.handleKey(dy > 0 ? 'ArrowDown' : 'ArrowUp');
      e.preventDefault();
    }, { passive: false });

    // Fade out loading screen
    loading.classList.add('fade');
    setTimeout(() => loading.remove(), 700);

    requestAnimationFrame(loop);
  }

  function loop(ts) {
    requestAnimationFrame(loop);
    if (ts - lastTime < TARGET_MS - 2) return;
    lastTime = ts;
    try {
      game.update();
      renderer.render();
    } catch (err) {
      console.error('[Game loop error]', err);
      // Show error on canvas so it's visible
      const ctx2 = canvas.getContext('2d');
      ctx2.fillStyle = '#0a0008';
      ctx2.fillRect(0, 0, canvas.width, canvas.height);
      ctx2.fillStyle = '#ff4060';
      ctx2.font = '13px monospace';
      ctx2.fillText('Error: ' + err.message, 20, 60);
      ctx2.fillStyle = '#888888';
      ctx2.font = '10px monospace';
      (err.stack || '').split('\n').slice(0,6).forEach((l,i) => ctx2.fillText(l, 20, 90 + i*18));
    }
  }

  // Kick off
  setTimeout(nextStep, 300);
})();
</script>
</body>
</html>
